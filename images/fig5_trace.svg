<svg viewBox="0 0 860 410" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="860" height="410" fill="white"/>

  <!-- 事件 1：user -->
  <rect x="24" y="16" width="812" height="72" rx="12" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <rect x="42" y="39" width="66" height="26" rx="13" fill="#5f6368"/>
  <text x="75" y="57" text-anchor="middle" fill="white" font-size="13" font-weight="600">user</text>
  <text x="128" y="58" font-size="16" fill="#202124">「分析 Initech 的資安狀況」</text>

  <text x="430" y="104" text-anchor="middle" font-size="20" fill="#5f6368">↓</text>

  <!-- 事件 2：functionCall -->
  <rect x="24" y="112" width="812" height="80" rx="12" fill="#e8f0fe" stroke="#dadce0" stroke-width="1.5"/>
  <rect x="42" y="126" width="118" height="26" rx="13" fill="#4285f4"/>
  <text x="101" y="144" text-anchor="middle" fill="white" font-size="12" font-weight="600">functionCall</text>
  <text x="180" y="145" font-size="15" font-family="monospace" fill="#202124">get_org_detail(org="Initech")</text>
  <text x="180" y="174" font-size="13" fill="#5f6368">← 模型決定要呼叫哪個工具、參數填什麼（靠你寫的 docstring 判斷）</text>

  <text x="430" y="210" text-anchor="middle" font-size="20" fill="#5f6368">↓</text>

  <!-- 事件 3：functionResponse -->
  <rect x="24" y="218" width="812" height="80" rx="12" fill="#e6f4ea" stroke="#dadce0" stroke-width="1.5"/>
  <rect x="42" y="232" width="150" height="26" rx="13" fill="#34a853"/>
  <text x="117" y="250" text-anchor="middle" fill="white" font-size="12" font-weight="600">functionResponse</text>
  <text x="210" y="251" font-size="13" font-family="monospace" fill="#202124">{ "org":"Initech", "overall_risk_level":"🔴 高風險", … }</text>
  <text x="210" y="280" font-size="13" fill="#5f6368">← 工具實際跑完，把資料回傳給模型（模型本來並不知道這些資料）</text>

  <text x="430" y="316" text-anchor="middle" font-size="20" fill="#5f6368">↓</text>

  <!-- 事件 4：model text -->
  <rect x="24" y="324" width="812" height="72" rx="12" fill="#fef7e0" stroke="#dadce0" stroke-width="1.5"/>
  <rect x="42" y="347" width="74" height="26" rx="13" fill="#e37400"/>
  <text x="79" y="365" text-anchor="middle" fill="white" font-size="12" font-weight="600">model</text>
  <text x="134" y="357" font-size="15" fill="#202124">產出 Markdown 資安報告（摘要、風險評分、建議…）</text>
  <text x="134" y="381" font-size="13" fill="#5f6368">← 模型讀完工具結果，才寫出最後的回答</text>
