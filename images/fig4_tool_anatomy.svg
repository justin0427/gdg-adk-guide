<svg viewBox="0 0 860 290" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="860" height="290" fill="white"/>

  <!-- 程式碼面板 -->
  <rect x="24" y="34" width="455" height="222" rx="10" fill="#1f2430"/>

  <g font-family="'SF Mono','Consolas',monospace" font-size="14.5">
    <text x="44" y="72" fill="#61afef">def <tspan fill="#e5c07b">list_orgs</tspan><tspan fill="#abb2bf">()</tspan> -&gt; <tspan fill="#61afef">dict</tspan><tspan fill="#abb2bf">:</tspan></text>
    <text x="44" y="102" fill="#98c379">    """列出有哪些公司與請求數量。</text>
    <text x="44" y="126" fill="#98c379">    使用者問「總覽」時使用。"""</text>
    <text x="44" y="156" fill="#abb2bf">    logs = _load_logs()</text>
    <text x="44" y="180" fill="#5c6370">    # 逐筆統計每家公司…</text>
    <text x="44" y="210" fill="#c678dd">    return <tspan fill="#abb2bf">{</tspan><tspan fill="#98c379">"orgs"</tspan><tspan fill="#abb2bf">: orgs, …}</tspan></text>
  </g>

  <!-- 1/2/3 照程式碼由上到下排列 -->
  <rect x="180" y="47" width="90" height="36" rx="8" fill="none" stroke="#34a853" stroke-width="1.8"/>
  <circle cx="294" cy="67" r="15" fill="#34a853"/>
  <text x="294" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>

  <rect x="38" y="84" width="314" height="58" rx="8" fill="none" stroke="#4285f4" stroke-width="1.8"/>
  <circle cx="374" cy="114" r="15" fill="#4285f4"/>
  <text x="374" y="119" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>

  <rect x="38" y="189" width="296" height="42" rx="8" fill="none" stroke="#34a853" stroke-width="1.8"/>
  <circle cx="356" cy="211" r="15" fill="#34a853"/>
  <text x="356" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>

  <!-- 右側對照說明：順序與左側一致 -->
  <rect x="540" y="44" width="252" height="58" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.8"/>
  <circle cx="566" cy="73" r="14" fill="#34a853"/>
  <text x="566" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="white">1</text>
  <text x="590" y="68" font-size="14.5" font-weight="700" fill="#188038">型別（-&gt; dict）</text>
  <text x="590" y="90" font-size="12.5" fill="#202124">告訴 Agent 會回傳什麼資料形狀。</text>

  <rect x="540" y="116" width="252" height="58" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.8"/>
  <circle cx="566" cy="145" r="14" fill="#4285f4"/>
  <text x="566" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="white">2</text>
  <text x="590" y="140" font-size="14.5" font-weight="700" fill="#1967d2">docstring</text>
  <text x="590" y="162" font-size="12.5" fill="#202124">判斷什麼時候該呼叫這個工具。</text>

  <rect x="540" y="188" width="252" height="58" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.8"/>
  <circle cx="566" cy="217" r="14" fill="#34a853"/>
  <text x="566" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="white">3</text>
  <text x="590" y="212" font-size="14.5" font-weight="700" fill="#188038">return</text>
  <text x="590" y="234" font-size="12.5" fill="#202124">工具真正交回給模型的結果。</text>
</svg>
