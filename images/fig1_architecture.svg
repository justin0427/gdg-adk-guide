<svg viewBox="0 0 860 350" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="860" height="350" fill="white"/>

  <!-- 外框：一支 Agent -->
  <rect x="30" y="26" width="800" height="210" rx="16" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <rect x="350" y="10" width="160" height="34" rx="17" fill="#4285f4"/>
  <text x="430" y="33" text-anchor="middle" fill="white" font-size="17" font-weight="600">一支 AI Agent</text>

  <!-- Model 卡 -->
  <rect x="60" y="72" width="230" height="140" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <circle cx="137" cy="104" r="7" fill="#4285f4"/>
  <text x="157" y="110" font-size="22" font-weight="700" fill="#1967d2">Model</text>
  <text x="175" y="150" text-anchor="middle" font-size="16" fill="#202124">模型 · 大腦</text>
  <text x="175" y="180" text-anchor="middle" font-size="14" fill="#5f6368">地端 LLM（Ollama）</text>

  <!-- Tools 卡 -->
  <rect x="315" y="72" width="230" height="140" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <circle cx="395" cy="104" r="7" fill="#34a853"/>
  <text x="415" y="110" font-size="22" font-weight="700" fill="#188038">Tools</text>
  <text x="430" y="150" text-anchor="middle" font-size="16" fill="#202124">工具 · 手</text>
  <text x="430" y="180" text-anchor="middle" font-size="14" fill="#5f6368">幾個 Python 函式</text>

  <!-- Instruction 卡 -->
  <rect x="570" y="72" width="230" height="140" rx="12" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
  <circle cx="623" cy="104" r="7" fill="#fbbc04"/>
  <text x="643" y="110" font-size="22" font-weight="700" fill="#b06000">Instruction</text>
  <text x="685" y="150" text-anchor="middle" font-size="16" fill="#202124">指令 · 工作守則</text>
  <text x="685" y="180" text-anchor="middle" font-size="14" fill="#5f6368">一段文字</text>

  <!-- 下方流程 -->
  <g font-size="14" fill="#202124">
    <rect x="35" y="290" width="128" height="40" rx="20" fill="white" stroke="#dadce0" stroke-width="1.5"/>
    <text x="99" y="315" text-anchor="middle">你說人話</text>
    <text x="178" y="316" text-anchor="middle" font-size="20" fill="#5f6368">→</text>

    <rect x="193" y="290" width="128" height="40" rx="20" fill="white" stroke="#dadce0" stroke-width="1.5"/>
    <text x="257" y="315" text-anchor="middle">Agent 判斷</text>
    <text x="336" y="316" text-anchor="middle" font-size="20" fill="#5f6368">→</text>

    <rect x="351" y="290" width="128" height="40" rx="20" fill="white" stroke="#dadce0" stroke-width="1.5"/>
    <text x="415" y="315" text-anchor="middle">呼叫工具</text>
    <text x="494" y="316" text-anchor="middle" font-size="20" fill="#5f6368">→</text>

    <rect x="509" y="290" width="128" height="40" rx="20" fill="white" stroke="#dadce0" stroke-width="1.5"/>
    <text x="573" y="315" text-anchor="middle">拿到結果</text>
    <text x="652" y="316" text-anchor="middle" font-size="20" fill="#5f6368">→</text>

    <rect x="667" y="290" width="128" height="40" rx="20" fill="white" stroke="#dadce0" stroke-width="1.5"/>
    <text x="731" y="315" text-anchor="middle">回覆你</text>
  </g>
</svg>
